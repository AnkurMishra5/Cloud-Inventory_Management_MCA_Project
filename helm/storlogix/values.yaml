# Default values — override per environment in values-<env>.yaml

replicaCount: 2

image:
  repository: ""   # Set via CI/CD: <dockerhub-username>/cloud-inventory-management
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: nginx
  host: "cloud-inventory.local"   # For demo: add master IP to /etc/hosts or use nip.io

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

probes:
  readiness:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 5
  liveness:
    path: /
    initialDelaySeconds: 15
    periodSeconds: 10

env: []
# - name: NODE_ENV
#   value: production
