# Auto-fill these IPs from: terraform output
# master_public_ip  → replace MASTER_IP
# worker_public_ips → replace WORKER_IP

[master]
master ansible_host=MASTER_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa

[workers]
worker-1 ansible_host=WORKER_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa

[all:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
