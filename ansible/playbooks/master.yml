---
# Initialize the kubeadm master node and install Flannel CNI + Nginx Ingress
- name: Initialize Kubernetes master
  hosts: master
  become: true

  tasks:
    - name: Get private IP
      ansible.builtin.shell: ip route get 1 | awk '{print $7; exit}'
      register: private_ip
      changed_when: false

    - name: Initialize kubeadm cluster
      ansible.builtin.command: >
        kubeadm init
        --pod-network-cidr=10.244.0.0/16
        --apiserver-advertise-address={{ private_ip.stdout }}
        --apiserver-cert-extra-sans={{ ansible_host }},{{ private_ip.stdout }}
      args:
        creates: /etc/kubernetes/admin.conf

    - name: Setup kubeconfig for ubuntu user
      ansible.builtin.shell: |
        mkdir -p /home/ubuntu/.kube
        cp /etc/kubernetes/admin.conf /home/ubuntu/.kube/config
        chown ubuntu:ubuntu /home/ubuntu/.kube/config
      args:
        creates: /home/ubuntu/.kube/config

    - name: Wait for Kubernetes API server to be ready
      ansible.builtin.shell: |
        kubectl --kubeconfig=/home/ubuntu/.kube/config get nodes
      register: api_ready
      retries: 20
      delay: 10
      until: api_ready.rc == 0
      become: false
      changed_when: false

    - name: Install Flannel CNI (pod networking)
      ansible.builtin.command: >
        kubectl --kubeconfig=/home/ubuntu/.kube/config apply -f
        https://raw.githubusercontent.com/flannel-io/flannel/master/Documentation/kube-flannel.yml
      become: false
      changed_when: false

    - name: Install Nginx Ingress Controller
      ansible.builtin.command: >
        kubectl --kubeconfig=/home/ubuntu/.kube/config apply -f
        https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.9.6/deploy/static/provider/baremetal/deploy.yaml
      become: false
      changed_when: false

    - name: Get worker join command
      ansible.builtin.command: kubeadm token create --print-join-command
      register: join_command
      changed_when: false

    - name: Save join command locally
      ansible.builtin.copy:
        content: "{{ join_command.stdout }}"
        dest: /tmp/k8s_join_command
      delegate_to: localhost
      become: false
