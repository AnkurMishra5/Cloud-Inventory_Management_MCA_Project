---
# Deploy Cloud Inventory Management app via Helm on the master node
- name: Deploy Cloud Inventory Management
  hosts: master
  become: false

  vars:
    helm_release: cloud-inventory-management
    helm_namespace: cloud-inventory-management
    docker_image: "{{ dockerhub_username }}/cloud-inventory-management"
    image_tag: "{{ image_tag | default('latest') }}"
    helm_chart_dest: /home/ubuntu/helm/cloud-inventory-management

  tasks:
    - name: Install Helm if not present
      ansible.builtin.shell: |
        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm
      become: true

    - name: Ensure Helm chart directory exists on master
      ansible.builtin.file:
        path: /home/ubuntu/helm
        state: directory
        mode: "0755"

    - name: Copy Helm chart to master node
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../helm/storlogix/"
        dest: "{{ helm_chart_dest }}"
        mode: "0644"

    - name: Create namespace
      ansible.builtin.command: >
        kubectl create namespace {{ helm_namespace }} --dry-run=client -o yaml | kubectl apply -f -
      changed_when: false

    - name: Deploy via Helm
      ansible.builtin.command: >
        helm upgrade --install {{ helm_release }} {{ helm_chart_dest }}
        --namespace {{ helm_namespace }}
        --set image.repository={{ docker_image }}
        --set image.tag={{ image_tag }}
        --wait --timeout 5m
      changed_when: true
